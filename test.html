<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Component</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap');

        .card {
            background-image: url('/wp12782220-stary-night-4k-wallpapers.jpg');
            background-size: cover;
            width: 260px;
            border-radius: 10px;
            overflow: hidden;
            padding: 20px;
            color: aliceblue;
        }

        .card img {
            width: 100%;
            transition: transform 0.8s;
        }

        .card img:hover {
            transform: scale(1.15);
        }

        .card h2 {
            font-family: 'Major Mono Display', serif;
            color: aliceblue;
        }

        .card p {
            font-family: 'Pacifico', serif;
            color: aliceblue;
        }

        .btn {
            margin: 10px auto;
            padding: 12px 8px;
            display: block;
            border-radius: 12px;
            background-color: transparent;
            color: white;
            border: 2px solid white;
            text-align: center;
            cursor: pointer;
            transition: border-radius 0.8s, width 0.8s;
            width: 30%;
        }

        .btn:hover {
            border-radius: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/Astronaut-suit-pana.png" alt="Astronaut">
        <h2>Title</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sint saepe mollitia iste inventore laborum non obcaecati, ea doloribus nobis vero.</p>
        <button class="btn">See More</button>
    </div>
</body>
</html>
