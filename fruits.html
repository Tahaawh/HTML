<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>میوه‌ها</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      display: grid;
      place-items: center;
      height: 100vh;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .card {
      background-color: #fff;
      padding: 1.5fr;
      border-radius: 8px;
      box-shadow: rgba(60, 90, 200, 0.4) 5px 5px, 
                  rgba(60, 90, 200, 0.3) 10px 10px, 
                  rgba(60, 90, 200, 0.2) 15px 15px, 
                  rgba(60, 90, 200, 0.1) 20px 20px, 
                  rgba(60, 90, 200, 0.05) 25px 25px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 1fr;
    }

    .card h2 {
      font-size: 1.5fr;
      margin-bottom: 0.5fr;
    }

    .card p {
      font-size: 1fr;
      margin-bottom: 1fr;
      color: #555;
    }

    .card button {
      background-color: #ff6347;
      color: white;
      border: none;
      padding: 0.5fr 1fr;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
    }

    .card button:hover {
      background-color: #ff4500;
      transform: scale(1.1);
    }

    .card:nth-child(1) {
      background-color: #f9f2dc;
    }

    .card:nth-child(2) {
      background-color: #d9f2e6;
    }

    .card:nth-child(3) {
      background-color: #f2d9d9;
    }
  </style>
</head>
<body>
  <div class="cards">
    <div class="card">
      <img src="strawberry.jpg" alt="توت‌فرنگی">
      <h2>توت‌فرنگی</h2>
      <p>منبع غنی ویتامین C و آنتی‌اکسیدان!</p>
      <button>بیشتر بدانید</button>
    </div>
    <div class="card">
      <img src="pineapple.jpg" alt="آناناس">
      <h2>آناناس</h2>
      <p>مفید برای گوارش و سرشار از آنزیم‌های طبیعی!</p>
      <button>بیشتر بدانید</button>
    </div>
    <div class="card">
      <img src="grape.jpg" alt="انگور">
      <h2>انگور</h2>
      <p>سرشار از انرژی و تقویت‌کننده سیستم ایمنی!</p>
      <button>بیشتر بدانید</button>
    </div>
  </div>
</body>
</html>
